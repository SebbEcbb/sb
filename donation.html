<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting to PayPal...</title>
</head>
<body>
    <p style="text-align: center; margin-top: 50px;">
        Redirecting you to the donation page...
    </p>

    <form id="paypal-form" action="https://www.paypal.com/donate" method="post" style="display: none;">
        <input type="hidden" name="hosted_button_id" value="SDTTCGFJ7ZRMN" />
    </form>

    <script>
        // Logic: Once the window finishes loading, execute the function
        window.onload = function() {
            // 1. Find the form element by its ID "paypal-form"
            const form = document.getElementById('paypal-form');

            // 2. Use the .submit() method to send the form data to PayPal
            // This acts exactly like a user clicking a 'Submit' button
            form.submit(); 
        };
    </script>
</body>
</html>
